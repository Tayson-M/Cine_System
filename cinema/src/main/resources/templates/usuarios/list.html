<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${sucesso}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>👥 Usuários</h2>
      <a th:href="@{/usuarios/novo}" class="btn btn-dark">+ Novo Usuário</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-dark">
            <tr><th>#</th><th>Login</th><th>Cargo</th><th>Ações</th></tr>
          </thead>
          <tbody>
            <tr th:each="u : ${usuarios}">
              <td th:text="${u.id}"></td>
              <td th:text="${u.login}"></td>
              <td>
                <span th:class="${u.cargo.name() == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-secondary'"
                      th:text="${u.cargo}"></span>
              </td>
              <td>
                <form th:action="@{/usuarios/{id}/deletar(id=${u.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Remover usuário?')">
                  <button class="btn btn-sm btn-outline-danger">Remover</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(usuarios)}">
              <td colspan="4" class="text-center text-muted py-3">Nenhum usuário cadastrado.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
