<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Usuário - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-4">
    <div class="card shadow-sm" style="max-width:480px;">
      <div class="card-header bg-dark text-white">Novo Usuário</div>
      <div class="card-body">
        <form th:action="@{/usuarios}" th:object="${usuario}" method="post">

          <div class="mb-3">
            <label class="form-label fw-semibold">Login *</label>
            <input type="text" th:field="*{login}" class="form-control"
                   th:classappend="${#fields.hasErrors('login')} ? 'is-invalid'"
                   placeholder="mínimo 3 caracteres">
            <div class="invalid-feedback" th:errors="*{login}"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Senha *</label>
            <input type="password" th:field="*{senha}" class="form-control"
                   th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'"
                   placeholder="mínimo 6 caracteres">
            <div class="invalid-feedback" th:errors="*{senha}"></div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Cargo *</label>
            <select th:field="*{cargo}" class="form-select"
                    th:classappend="${#fields.hasErrors('cargo')} ? 'is-invalid'">
              <option value="">Selecione</option>
              <option th:each="c : ${cargos}" th:value="${c}" th:text="${c}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{cargo}"></div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Cadastrar</button>
            <a th:href="@{/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
