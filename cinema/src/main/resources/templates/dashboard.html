<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - CinemaSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-5">
    <h2>Bem-vindo ao CinemaSystem 🎬</h2>
    <p class="text-muted">
      Olá, <strong sec:authentication="name">usuário</strong>! Login realizado com sucesso.
    </p>
    <div class="row mt-4">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <div style="font-size:2rem;">👥</div>
            <h6 class="mt-2">Usuários</h6>
            <a th:href="@{/usuarios}" class="btn btn-sm btn-dark mt-2">Gerenciar</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
